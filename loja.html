<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Carregando Catálogo...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJaxRdA6uzbN41JvAw8xO7F5mzJaDfMBc",
            authDomain: "gen-lang-client-0664324166.firebaseapp.com",
            projectId: "gen-lang-client-0664324166",
            storageBucket: "gen-lang-client-0664324166.firebasestorage.app",
            messagingSenderId: "1074933311707",
            appId: "1:1074933311707:web:d841b61f84c05a40fc04fe"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app, "ai-studio-2395f72f-4dac-4517-9681-c654cd1a03ca");

        window.db = db;
        window.firebaseUtils = { doc, getDoc };
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .cart-drawer { transform: translateX(100%); transition: transform 0.3s ease-in-out; }
        .cart-drawer.open { transform: translateX(0); }
        .overlay { opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .overlay.open { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body class="bg-white text-slate-900">
    <div id="app">
        <div class="min-h-screen flex items-center justify-center">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-orange-500"></div>
        </div>
    </div>

    <div id="overlay" class="overlay fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50" onclick="toggleCart(false)"></div>
    <div id="cart-drawer" class="cart-drawer fixed top-0 right-0 h-full w-full max-w-md bg-white z-50 shadow-2xl flex flex-col">
        <div class="p-6 border-b border-slate-100 flex items-center justify-between">
            <h2 class="text-xl font-black uppercase italic tracking-tighter">Seu Carrinho</h2>
            <button onclick="toggleCart(false)" class="p-2 hover:bg-slate-100 rounded-full"><i data-lucide="x"></i></button>
        </div>
        <div id="cart-items" class="flex-1 overflow-y-auto p-6 space-y-6"></div>
        <div id="cart-footer" class="p-6 border-t border-slate-100 bg-slate-50 space-y-4"></div>
    </div>

    <button id="cart-fab" onclick="toggleCart(true)" class="hidden fixed bottom-8 right-8 text-white p-5 rounded-full shadow-2xl z-40 flex items-center justify-center">
        <i data-lucide="shopping-cart" size="28"></i>
        <span id="cart-count" class="absolute -top-2 -right-2 bg-slate-900 text-white text-xs font-bold w-7 h-7 rounded-full flex items-center justify-center border-2 border-white">0</span>
    </button>

    <script>
        let storeData = null;
        let cart = [];

        // Proxy de Imagem (Simplificado e Direto)
        function proxyImg(url) {
            if (!url) return '';
            let u = url.trim();

            // Se for link de visualizador, tenta corrigir (mas o ideal é o link direto)
            if (u.includes('ibb.co/') && !u.includes('i.ibb.co/')) {
                u = u.replace('ibb.co/', 'i.ibb.co/') + '.png'; 
            }
            if (u.includes('postimg.cc/') && !u.includes('i.postimg.cc/')) {
                u = u.replace('postimg.cc/', 'i.postimg.cc/') + '/image.png';
            }

            if (!u.startsWith('http')) u = 'https://' + u;
            
            // Retorna o link direto sem atravessadores
            return u;
        }

        async function decodeData() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const storeId = urlParams.get('id');
                if (!storeId) return null;

                const { doc, getDoc } = window.firebaseUtils;
                const docSnap = await getDoc(doc(window.db, "stores", storeId));

                if (!docSnap.exists()) return null;

                const data = docSnap.data();
                return {
                    name: data.n,
                    whatsapp: data.w,
                    address: data.a,
                    instagram: data.ig,
                    facebook: data.fb,
                    primaryColor: data.c.startsWith('#') ? data.c : '#' + data.c,
                    secondaryColor: data.b.startsWith('#') ? data.b : '#' + data.b,
                    bannerImage: data.bi,
                    type: data.t,
                    status: data.status || 'active',
                    expiresAt: data.expiresAt || data.createdAt,
                    products: (data.p || []).map(p => ({
                        id: Math.random().toString(36).substr(2, 9),
                        name: p.n,
                        price: p.p,
                        image: p.i
                    }))
                };
            } catch (e) { 
                console.error("Erro ao buscar dados:", e);
                return null; 
            }
        }

        function formatCurrency(value) {
            const num = typeof value === 'string' ? parseFloat(value.replace(',', '.')) : value;
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(num || 0);
        }

        function toggleCart(open) {
            document.getElementById('cart-drawer').classList.toggle('open', open);
            document.getElementById('overlay').classList.toggle('open', open);
        }

        function addToCart(productId) {
            const product = storeData.products.find(p => p.id === productId);
            const existing = cart.find(item => item.id === productId);
            if (existing) existing.quantity++;
            else cart.push({ ...product, quantity: 1 });
            updateCartUI();
            toggleCart(true);
        }

        function updateQuantity(id, delta) {
            const item = cart.find(i => i.id === id);
            if (item) item.quantity = Math.max(1, item.quantity + delta);
            updateCartUI();
        }

        function removeFromCart(id) {
            cart = cart.filter(i => i.id !== id);
            updateCartUI();
        }

        function updateCartUI() {
            const itemsContainer = document.getElementById('cart-items');
            const footerContainer = document.getElementById('cart-footer');
            const fab = document.getElementById('cart-fab');
            const countBadge = document.getElementById('cart-count');

            const totalItems = cart.reduce((acc, item) => acc + item.quantity, 0);
            countBadge.innerText = totalItems;
            fab.classList.toggle('hidden', totalItems === 0);
            fab.style.backgroundColor = storeData.primaryColor;

            if (cart.length === 0) {
                itemsContainer.innerHTML = '<p class="text-center text-slate-400">Carrinho vazio</p>';
                footerContainer.innerHTML = '';
            } else {
                itemsContainer.innerHTML = cart.map(item => `
                    <div class="flex gap-4 items-start">
                        <img src="${proxyImg(item.image)}" class="w-16 h-16 rounded-lg object-cover" referrerpolicy="no-referrer">
                        <div class="flex-1">
                            <h4 class="font-bold text-sm">${item.name}</h4>
                            <p class="text-xs font-bold" style="color: ${storeData.primaryColor}">${formatCurrency(item.price)}</p>
                            <div class="flex items-center gap-2 mt-2">
                                <button onclick="updateQuantity('${item.id}', -1)" class="w-6 h-6 bg-slate-100 rounded">-</button>
                                <span class="text-xs font-bold">${item.quantity}</span>
                                <button onclick="updateQuantity('${item.id}', 1)" class="w-6 h-6 bg-slate-100 rounded">+</button>
                            </div>
                        </div>
                        <button onclick="removeFromCart('${item.id}')" class="text-red-500"><i data-lucide="trash-2" size="16"></i></button>
                    </div>
                `).join('');

                const total = cart.reduce((acc, item) => acc + (parseFloat(item.price.replace(',', '.')) * item.quantity), 0);
                footerContainer.innerHTML = `
                    <div class="flex justify-between font-bold"><span>Total</span><span>${formatCurrency(total)}</span></div>
                    <button onclick="checkout()" class="w-full py-4 text-white font-bold rounded-xl shadow-lg" style="background-color: ${storeData.primaryColor}">Finalizar no WhatsApp</button>
                `;
            }
            lucide.createIcons();
        }

        function checkout() {
            let message = `*Novo Pedido - ${storeData.name}*\n\n`;
            cart.forEach(item => message += `- ${item.quantity}x ${item.name} (${formatCurrency(item.price)})\n`);
            const total = cart.reduce((acc, item) => acc + (parseFloat(item.price.replace(',', '.')) * item.quantity), 0);
            message += `\n*Total: ${formatCurrency(total)}*`;
            window.open(`https://wa.me/55${storeData.whatsapp}?text=${encodeURIComponent(message)}`, '_blank');
        }

        function renderStore() {
            const urlParams = new URLSearchParams(window.location.search);
            const app = document.getElementById('app');
            if (!storeData) {
                app.innerHTML = '<div class="p-8 text-center"><h1 class="text-xl font-bold">Link Inválido</h1><a href="criar.html" class="text-orange-500">Criar Catálogo</a></div>';
                return;
            }

            // Verificação de Expiração
            const now = new Date();
            const expiresAt = new Date(storeData.expiresAt || storeData.createdAt);
            const isExpired = now > expiresAt;
            const isBlocked = storeData.status === 'blocked';

            if (isExpired || isBlocked) {
                app.innerHTML = `
                    <div class="min-h-screen flex flex-col items-center justify-center p-6 text-center bg-slate-50">
                        <div class="bg-white p-10 rounded-3xl shadow-2xl border border-slate-100 max-w-md w-full space-y-6">
                            <div class="bg-red-100 text-red-600 w-20 h-20 rounded-full flex items-center justify-center mx-auto">
                                <i data-lucide="lock" size="40"></i>
                            </div>
                            <h1 class="text-2xl font-black uppercase italic tracking-tighter">Catálogo Suspenso</h1>
                            <p class="text-slate-500 font-medium leading-relaxed">
                                O período de teste ou a mensalidade deste catálogo expirou. Para reativar e continuar vendendo, entre em contato com o suporte.
                            </p>
                            <a href="https://wa.me/5585992862177?text=Olá! Meu catálogo ${storeData.name} expirou e quero reativar." 
                               class="block w-full py-4 bg-green-500 text-white font-black uppercase italic tracking-widest rounded-2xl hover:bg-green-600 transition-all shadow-lg">
                                <i data-lucide="phone" class="inline-block mr-2" size="18"></i> Falar com Suporte
                            </a>
                            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">ID: ${urlParams.get('id')}</p>
                        </div>
                    </div>
                `;
                lucide.createIcons();
                return;
            }

            document.title = storeData.name;
            const productsHTML = storeData.products.map(p => `
                <div class="bg-white rounded-2xl overflow-hidden border border-slate-100 shadow-sm hover:shadow-md transition-shadow">
                    <img src="${proxyImg(p.image)}" class="w-full aspect-square object-cover" referrerpolicy="no-referrer" onerror="this.src='https://picsum.photos/seed/'+Math.random()+'/400/400'">
                    <div class="p-4 sm:p-6">
                        <h3 class="font-bold text-base sm:text-lg mb-1 truncate">${p.name}</h3>
                        <p class="font-black text-lg sm:text-xl mb-4" style="color: ${storeData.primaryColor}">${formatCurrency(p.price)}</p>
                        <button onclick="addToCart('${p.id}')" class="w-full py-3 sm:py-4 text-white font-bold rounded-xl text-sm sm:text-base uppercase tracking-widest italic" style="background-color: ${storeData.primaryColor}">Adicionar</button>
                    </div>
                </div>
            `).join('');

            app.innerHTML = `
                <div class="min-h-screen bg-white flex flex-col">
                    <div class="relative py-12 sm:py-20 px-6 text-center overflow-hidden" style="background-color: ${storeData.secondaryColor}; color: #ffffff">
                        ${storeData.bannerImage ? `<img src="${proxyImg(storeData.bannerImage)}" class="absolute inset-0 w-full h-full object-cover opacity-30 z-0" referrerpolicy="no-referrer">` : ''}
                        <div class="relative z-10">
                            <h1 class="text-3xl sm:text-5xl md:text-6xl font-black italic uppercase tracking-tighter mb-4">${storeData.name}</h1>
                            <div class="inline-flex items-center gap-2 bg-white/20 px-4 py-2 rounded-full text-[10px] sm:text-xs font-bold uppercase tracking-widest">
                                <i data-lucide="smartphone" size="14"></i> Pedidos via WhatsApp
                            </div>
                        </div>
                    </div>

                    <main class="max-w-6xl mx-auto px-6 py-10 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 sm:gap-8 flex-1 w-full">
                        ${productsHTML}
                    </main>

                    <footer class="bg-slate-900 text-white py-12 px-6 mt-10">
                        <div class="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
                            <div class="text-center md:text-left space-y-4">
                                <h2 class="text-2xl font-black italic uppercase tracking-tighter">${storeData.name}</h2>
                                ${storeData.address ? `<p class="text-slate-400 text-sm flex items-center justify-center md:justify-start gap-2"><i data-lucide="map-pin" size="16"></i> ${storeData.address}</p>` : ''}
                            </div>

                            <div class="flex flex-col items-center md:items-end gap-4">
                                <div class="flex gap-4">
                                    ${storeData.instagram ? `
                                        <a href="https://instagram.com/${storeData.instagram.replace('@', '')}" target="_blank" class="p-3 bg-white/10 rounded-full hover:bg-orange-500 transition-all flex items-center justify-center">
                                            <i data-lucide="instagram" class="w-5 h-5"></i>
                                        </a>
                                    ` : ''}
                                    ${storeData.facebook ? `
                                        <a href="${storeData.facebook.startsWith('http') ? storeData.facebook : 'https://' + storeData.facebook}" target="_blank" class="p-3 bg-white/10 rounded-full hover:bg-blue-600 transition-all flex items-center justify-center">
                                            <i data-lucide="facebook" class="w-5 h-5"></i>
                                        </a>
                                    ` : ''}
                                    <a href="https://wa.me/55${storeData.whatsapp}" target="_blank" class="p-3 bg-white/10 rounded-full hover:bg-green-500 transition-all flex items-center justify-center">
                                        <i data-lucide="phone" class="w-5 h-5"></i>
                                    </a>
                                </div>
                                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest">Gerado por CatálogoZap</p>
                                <a href="criar.html?edit=${urlParams.get('id')}" class="text-slate-600 text-[10px] font-bold uppercase tracking-widest hover:text-orange-500 underline">Editar esta página</a>
                            </div>
                        </div>
                    </footer>
                </div>
            `;
            lucide.createIcons();
        }

        window.onload = async () => {
            // Aguarda um pouco para o Firebase inicializar
            let attempts = 0;
            while (!window.firebaseUtils && attempts < 50) {
                await new Promise(r => setTimeout(r, 100));
                attempts++;
            }
            
            storeData = await decodeData();
            renderStore();
        };
    </script>
</body>
</html>

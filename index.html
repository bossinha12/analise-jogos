<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>CatálogoZap - Vitrine Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .img-container { 
            width: 100%; 
            max-width: 800px; 
            background: #f8fafc;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 30px 60px -12px rgba(0,0,0,0.2);
            border: 6px solid white;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <main class="min-h-screen flex flex-col items-center justify-center px-4 py-12 text-center">
        <div class="max-w-4xl w-full space-y-8">
            <h1 class="text-5xl sm:text-7xl md:text-8xl font-black tracking-tighter uppercase italic leading-[0.85]">
                Venda mais pelo <br><span class="text-orange-500">WhatsApp</span>
            </h1>
            
            <p class="text-lg sm:text-xl md:text-2xl text-slate-500 font-medium max-w-2xl mx-auto leading-relaxed">
                Crie seu catálogo profissional em segundos e receba pedidos organizados direto no seu celular.
            </p>

            <div class="pt-4">
                <a href="criar.html" class="inline-flex items-center gap-3 px-12 py-6 bg-slate-900 text-white rounded-2xl font-black uppercase italic tracking-widest text-xl hover:bg-orange-600 transition-all shadow-2xl hover:scale-105 active:scale-95">
                    <i data-lucide="zap"></i> Criar Agora
                </a>
            </div>
        </div>

        <!-- Imagem de Preview (Direta e Estável) -->
        <div class="mt-16 w-full flex justify-center px-4">
            <div class="img-container">
                <img src="https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?auto=format&fit=crop&w=800&q=80" 
                     alt="Preview" 
                     class="w-full h-auto block"
                     referrerpolicy="no-referrer">
            </div>
        </div>
    </main>

    <footer class="py-10 text-center text-slate-400 text-[10px] font-bold uppercase tracking-widest">
        &copy; 2026 CatálogoZap - Vitrine Digital Profissional
    </footer>

    <script>lucide.createIcons();</script>
</body>
</html>

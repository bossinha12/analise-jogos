<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar meu CatálogoZap V15</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAJaxRdA6uzbN41JvAw8xO7F5mzJaDfMBc",
            authDomain: "gen-lang-client-0664324166.firebaseapp.com",
            projectId: "gen-lang-client-0664324166",
            storageBucket: "gen-lang-client-0664324166.firebasestorage.app",
            messagingSenderId: "1074933311707",
            appId: "1:1074933311707:web:d841b61f84c05a40fc04fe"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app, "ai-studio-2395f72f-4dac-4517-9681-c654cd1a03ca");

        window.db = db;
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .alert-direct { animation: pulse 2s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <header class="bg-white border-b border-slate-200 sticky top-0 z-10 px-4">
        <div class="max-w-4xl mx-auto h-16 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <div class="bg-orange-500 p-2 rounded-lg"><i data-lucide="shopping-bag" class="text-white w-5 h-5"></i></div>
                <h1 class="text-xl font-bold tracking-tight">CatálogoZap V15</h1>
            </div>
            <div class="flex gap-2 items-center">
                <div id="last-store-container" class="hidden">
                    <button onclick="editLastStore()" class="bg-orange-100 text-orange-600 px-3 py-2 rounded-xl text-[10px] font-bold hover:bg-orange-200 flex items-center gap-1">
                        <i data-lucide="history" size="12"></i> Editar Última
                    </button>
                </div>
                <button onclick="window.open('https://postimages.org/', '_blank')" class="bg-blue-600 text-white px-4 py-2 rounded-xl text-[10px] font-bold hover:bg-blue-700">
                    <i data-lucide="upload-cloud" size="12"></i> Postimages (RECOMENDADO)
                </button>
            </div>
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 py-8 pb-32">
        <!-- AVISO IMPORTANTE -->
        <div class="bg-slate-900 text-white p-4 rounded-2xl mb-8 shadow-lg alert-direct flex items-center gap-4 border-l-8 border-orange-500">
            <div class="bg-white/20 p-3 rounded-full text-orange-500"><i data-lucide="alert-circle"></i></div>
            <p class="text-xs font-bold leading-tight">
                USE O POSTIMAGES: Suba a foto e copie o <span class="text-orange-500 underline">"LINK DIRETO"</span>. É o único que funciona 100% no celular!
            </p>
        </div>
        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
            <div class="bg-orange-500 p-8 text-white">
                <h2 class="text-3xl font-black italic uppercase tracking-tighter mb-2">Crie sua vitrine hoje</h2>
                <p class="text-orange-100 font-medium">Preencha os dados e gere seu link instantâneo.</p>
            </div>

            <div class="p-8 space-y-10">
                <section class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Seu Nome (Responsável)</label>
                            <input type="text" id="owner-name" placeholder="Ex: João Silva" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-orange-500 focus:bg-white outline-none transition-all font-bold">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Nome da Loja</label>
                            <input type="text" id="store-name" placeholder="Ex: Hamburgueria do Jhow" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-orange-500 focus:bg-white outline-none transition-all font-bold">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">WhatsApp (DDD + Número)</label>
                            <input type="text" id="whatsapp" placeholder="Ex: 11999999999" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-orange-500 focus:bg-white outline-none transition-all font-bold">
                        </div>
                        <div class="space-y-2 md:col-span-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Endereço da Loja</label>
                            <input type="text" id="address" placeholder="Ex: Rua das Flores, 123 - São Paulo" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-orange-500 focus:bg-white outline-none transition-all font-bold">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Instagram (Opcional)</label>
                            <input type="text" id="instagram" placeholder="Ex: @minhaloja" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-orange-500 focus:bg-white outline-none transition-all font-bold">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Facebook (Opcional)</label>
                            <input type="text" id="facebook" placeholder="Ex: facebook.com/minhaloja" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-orange-500 focus:bg-white outline-none transition-all font-bold">
                        </div>
                    </div>
                </section>

                <section class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Nicho</label>
                            <select id="niche" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-orange-500 focus:bg-white outline-none transition-all font-bold">
                                <option value="loja">Loja</option>
                                <option value="cardapio">Cardápio</option>
                                <option value="servicos">Serviços</option>
                                <option value="portfolio">Portfólio</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Cor Principal</label>
                            <input type="color" id="primary-color" value="#f97316" class="w-full h-14 rounded-2xl cursor-pointer">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Cor do Banner</label>
                            <input type="color" id="secondary-color" value="#0f172a" class="w-full h-14 rounded-2xl cursor-pointer">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">URL da Imagem de Banner (Opcional)</label>
                        <input type="text" id="banner-image" placeholder="https://i.ibb.co/minhafoto.jpg" class="w-full px-5 py-4 rounded-2xl bg-slate-50 border-2 border-transparent focus:border-orange-500 focus:bg-white outline-none transition-all font-bold">
                    </div>
                </section>

                <section class="space-y-6">
                    <div class="flex items-center justify-between mb-2">
                        <h3 class="font-black uppercase italic tracking-widest text-sm text-orange-600">Itens</h3>
                        <button onclick="addProduct()" class="bg-orange-100 text-orange-600 px-4 py-2 rounded-xl text-xs font-bold hover:bg-orange-200">Adicionar Item</button>
                    </div>
                    <div id="products-list" class="space-y-4"></div>
                </section>

                <button onclick="generateStore()" class="w-full py-6 bg-slate-900 text-white rounded-3xl font-black uppercase italic tracking-widest text-xl hover:bg-slate-800 transition-all flex items-center justify-center gap-3">
                    <i data-lucide="smartphone"></i> Gerar Minha Página
                </button>
            </div>
        </div>

        <div id="result-section" class="hidden mt-12 space-y-6">
            <div class="bg-orange-50 rounded-3xl p-8 border-2 border-orange-200">
                <h3 class="text-orange-800 font-black italic uppercase tracking-tighter text-2xl mb-6">Página Gerada!</h3>
                <div class="space-y-6">
                    <div>
                        <h4 class="text-orange-800 font-bold mb-2">Link Público:</h4>
                        <div class="flex flex-col sm:flex-row gap-2">
                            <div id="public-link" class="flex-1 bg-white px-4 py-3 rounded-xl border border-orange-200 text-slate-600 text-sm truncate font-mono"></div>
                            <button onclick="copyLink('public-link')" class="px-6 py-3 bg-orange-600 text-white rounded-xl font-bold hover:bg-orange-700">Copiar Link</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        let products = [{ id: Date.now().toString(), name: '', price: '', image: '' }];

        function addProduct() {
            products.push({ id: Date.now().toString(), name: '', price: '', image: '' });
            renderProducts();
        }

        function removeProduct(id) {
            if (products.length > 1) {
                products = products.filter(p => p.id !== id);
                renderProducts();
            }
        }

        function updateProduct(id, field, value) {
            const p = products.find(p => p.id === id);
            if (p) p[field] = value;
        }

        function renderProducts() {
            const list = document.getElementById('products-list');
            list.innerHTML = products.map(p => `
                <div class="flex flex-col md:flex-row gap-4 bg-slate-50 p-6 rounded-3xl border border-slate-100 relative">
                    <button onclick="removeProduct('${p.id}')" class="absolute top-2 right-2 text-red-500 p-2"><i data-lucide="trash-2" size="16"></i></button>
                    <input type="text" value="${p.name}" oninput="updateProduct('${p.id}', 'name', this.value)" placeholder="Nome do Item" class="flex-1 px-4 py-3 rounded-xl border border-slate-200">
                    <input type="text" value="${p.price}" oninput="updateProduct('${p.id}', 'price', this.value)" placeholder="Preço" class="w-full md:w-32 px-4 py-3 rounded-xl border border-slate-200">
                    <input type="text" value="${p.image}" oninput="updateProduct('${p.id}', 'image', this.value)" placeholder="URL da Foto" class="flex-1 px-4 py-3 rounded-xl border border-slate-200">
                </div>
            `).join('');
            lucide.createIcons();
        }

        async function generateStore() {
            const ownerName = document.getElementById('owner-name').value;
            const name = document.getElementById('store-name').value;
            const whatsapp = document.getElementById('whatsapp').value;
            const bannerImage = document.getElementById('banner-image').value;
            const address = document.getElementById('address').value;
            const instagram = document.getElementById('instagram').value;
            const facebook = document.getElementById('facebook').value;

            if (!name || !whatsapp || !ownerName) {
                alert("Preencha o seu nome, o nome da loja e o WhatsApp!");
                return;
            }

            const btn = document.querySelector('button[onclick="generateStore()"]');
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="animate-spin" data-lucide="loader-2"></i> Salvando...';
            btn.disabled = true;
            lucide.createIcons();

            // Objeto ultra-otimizado
            const data = {
                cn: ownerName,
                n: name,
                w: whatsapp.replace(/\D/g, ''),
                createdAt: new Date().toISOString(),
                status: "trial",
                expiresAt: new Date(Date.now() + 3 * 24 * 60 * 60 * 1000).toISOString() // 3 dias de teste
            };

            if (address) data.a = address;
            if (instagram) data.ig = instagram.replace('@', '');
            if (facebook) data.fb = facebook;
            if (bannerImage) data.bi = bannerImage;
            
            data.c = document.getElementById('primary-color').value.replace('#', '');
            data.b = document.getElementById('secondary-color').value.replace('#', '');
            data.t = document.getElementById('niche').value;
            
            const validProducts = products.filter(p => p.name && p.price);
            if (validProducts.length > 0) {
                data.p = validProducts.map(p => {
                    const item = { n: p.name, p: p.price };
                    if (p.image) item.i = p.image;
                    return item;
                });
            }

            try {
                // Usa o ID existente se estiver editando, senão gera um novo
                const urlParams = new URLSearchParams(window.location.search);
                const existingId = urlParams.get('edit') || urlParams.get('id');
                const storeId = existingId || Math.random().toString(36).substring(2, 8);
                
                const { doc, getDoc, setDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");

                // Se estiver editando, mantém o status e expiração originais
                if (existingId) {
                    const docSnap = await getDoc(doc(window.db, "stores", existingId));
                    if (docSnap.exists()) {
                        const oldData = docSnap.data();
                        data.status = oldData.status || "trial";
                        data.expiresAt = oldData.expiresAt || data.expiresAt;
                        data.createdAt = oldData.createdAt || data.createdAt;
                    }
                }

                // Salva no Firebase
                await setDoc(doc(window.db, "stores", storeId), data);

                const publicUrl = window.location.origin + window.location.pathname.replace('criar.html', 'loja.html') + '?id=' + storeId;

                // Salva o ID na memória do navegador
                localStorage.setItem('lastStoreId', storeId);
                localStorage.setItem('lastStoreName', name);

                document.getElementById('public-link').innerText = publicUrl;
                
                const resultSection = document.getElementById('result-section');
                const editBtnId = 'edit-page-btn';
                if (!document.getElementById(editBtnId)) {
                    const editBtn = document.createElement('div');
                    editBtn.id = editBtnId;
                    editBtn.className = "mt-4 flex flex-col items-center gap-3";
                    editBtn.innerHTML = `
                        <a href="loja.html?id=${storeId}" target="_blank" class="text-orange-600 font-bold underline text-sm flex items-center gap-1">
                            <i data-lucide="external-link" size="14"></i> Visualizar minha página agora
                        </a>
                        <button onclick="deleteStore('${storeId}')" class="text-red-500 font-bold text-[10px] uppercase tracking-widest flex items-center gap-1 hover:text-red-700 transition-colors">
                            <i data-lucide="trash-2" size="12"></i> Excluir esta página permanentemente
                        </button>
                        <p class="text-[10px] text-slate-400">Guarde este link para editar sua página futuramente!</p>
                    `;
                    resultSection.querySelector('.bg-orange-50').appendChild(editBtn);
                } else {
                    document.getElementById(editBtnId).querySelector('a').href = `loja.html?id=${storeId}`;
                    document.getElementById(editBtnId).querySelector('button').onclick = () => deleteStore(storeId);
                }

                resultSection.classList.remove('hidden');
                resultSection.scrollIntoView({ behavior: 'smooth' });
                checkLastStore(); // Atualiza o botão do topo
            } catch (error) {
                console.error("Erro ao salvar:", error);
                alert("Erro ao salvar no banco de dados. Tente novamente.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
                lucide.createIcons();
            }
        }

        async function shortenUrl(url) {
            alert("Dica: Como o link contém todos os dados, ele é naturalmente longo. Para enviar um link curto, recomendamos usar o site 'bitly.com' ou 'tinyurl.com' colando seu link lá!");
        }

        function copyLink(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            alert("Link copiado!");
        }

        function checkLastStore() {
            const lastId = localStorage.getItem('lastStoreId');
            const lastName = localStorage.getItem('lastStoreName');
            const container = document.getElementById('last-store-container');
            if (lastId) {
                container.classList.remove('hidden');
                container.querySelector('button').title = `Editar: ${lastName}`;
            } else {
                container.classList.add('hidden');
            }
        }

        function editLastStore() {
            const lastId = localStorage.getItem('lastStoreId');
            if (lastId) {
                const url = new URL(window.location.href);
                url.searchParams.set('edit', lastId);
                window.location.href = url.toString();
            }
        }

        async function deleteStore(id) {
            if (!confirm("TEM CERTEZA? Isso vai apagar sua página para sempre e o link deixará de funcionar!")) return;
            
            try {
                const { doc, deleteDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
                await deleteDoc(doc(window.db, "stores", id));
                
                // Limpa a memória se for a última loja
                if (localStorage.getItem('lastStoreId') === id) {
                    localStorage.removeItem('lastStoreId');
                    localStorage.removeItem('lastStoreName');
                }
                
                alert("Página excluída com sucesso!");
                window.location.href = 'criar.html';
            } catch (error) {
                console.error("Erro ao excluir:", error);
                alert("Erro ao excluir. Tente novamente.");
            }
        }

        async function loadFromFirebase() {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const storeId = urlParams.get('edit') || urlParams.get('id');
                if (!storeId) return;

                // Aguarda o Firebase inicializar
                let attempts = 0;
                while (!window.db && attempts < 50) {
                    await new Promise(r => setTimeout(r, 100));
                    attempts++;
                }

                const { doc, getDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
                const docSnap = await getDoc(doc(window.db, "stores", storeId));

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    
                    document.getElementById('owner-name').value = data.cn || '';
                    document.getElementById('store-name').value = data.n || '';
                    document.getElementById('whatsapp').value = data.w || '';
                    document.getElementById('address').value = data.a || '';
                    document.getElementById('instagram').value = data.ig || '';
                    document.getElementById('facebook').value = data.fb || '';
                    document.getElementById('primary-color').value = data.c ? '#' + data.c : '#f97316';
                    document.getElementById('secondary-color').value = data.b ? '#' + data.b : '#0f172a';
                    document.getElementById('banner-image').value = data.bi || '';
                    document.getElementById('niche').value = data.t || 'loja';
                    
                    if (data.p && data.p.length > 0) {
                        products = data.p.map(p => ({
                            id: Math.random().toString(36).substr(2, 9),
                            name: p.n,
                            price: p.p,
                            image: p.i
                        }));
                    }
                    renderProducts();
                }
            } catch (e) { console.error("Erro ao carregar dados:", e); }
        }

        window.onload = () => {
            checkLastStore();
            loadFromFirebase();
            renderProducts();
        };
    </script>
</body>
</html>
